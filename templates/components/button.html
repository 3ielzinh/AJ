{% if href %}
<a
    href="{{ href }}"
    class="btn btn--{{ variant|default:'primary' }} {{ extra_class }}"
    {% if disabled %}aria-disabled="true"{% endif %}
>{{ label }}</a>
{% else %}
<button
    type="{{ type|default:'button' }}"
    class="btn btn--{{ variant|default:'primary' }} {{ extra_class }}"
    {% if disabled %}disabled{% endif %}
>{{ label }}</button>
{% endif %}
