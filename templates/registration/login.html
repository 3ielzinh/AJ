{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar — AJ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>">
    <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
        }

        .login-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl, 1rem);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
        }

        .login-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .login-brand-icon {
            font-size: 2rem;
            line-height: 1;
        }

        .login-brand-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary);
            letter-spacing: -0.02em;
        }

        .login-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--color-text);
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--color-text);
            margin-bottom: 0.375rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md, 0.5rem);
            font-size: 0.9375rem;
            color: var(--color-text);
            background: var(--color-surface);
            transition: border-color 0.15s, box-shadow 0.15s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 95, 115, 0.12);
        }

        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: var(--radius-md, 0.5rem);
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            color: #b91c1c;
        }

        .btn-login {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md, 0.5rem);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            background: var(--color-primary-dark);
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8125rem;
            color: var(--color-text-muted);
        }
    </style>
</head>
<body>

<div class="login-card">
    <a href="/" class="login-brand">
        <span class="login-brand-icon">⚖️</span>
        <span class="login-brand-name">AJ</span>
    </a>

    <h1 class="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle">Entre com suas credenciais para continuar</p>

    {% if form.errors %}
    <div class="login-error">
        Usuário ou senha inválidos. Tente novamente.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">

        <div class="form-group">
            <label for="id_username">Usuário</label>
            <input type="text" id="id_username" name="username"
                   autofocus autocomplete="username"
                   placeholder="Nome de usuário"
                   value="{{ form.username.value|default:'' }}">
        </div>

        <div class="form-group">
            <label for="id_password">Senha</label>
            <input type="password" id="id_password" name="password"
                   autocomplete="current-password"
                   placeholder="Sua senha">
        </div>

        <button type="submit" class="btn-login">Entrar</button>
    </form>

    <p class="login-footer">CGPJU · Assessoria Jurídica</p>
</div>

</body>
</html>
