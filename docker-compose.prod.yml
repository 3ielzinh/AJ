services:
  db:
    image: postgres:15-alpine
    container_name: aj-db-prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_IMAGE:-aj}:${DOCKER_TAG:-latest}
    container_name: aj-web-prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      DATABASE: postgres
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8000:8000"
    volumes:
      - static_data_prod:/app/staticfiles
      - media_data_prod:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data_prod:
  static_data_prod:
  media_data_prod:
