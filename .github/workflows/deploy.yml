name: CI/CD - Build e Deploy

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/aj

jobs:
  # ============================================
  # STAGE 1: Testes
  # ============================================
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: django-insecure-ci-only
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: aj_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django checks
        run: |
          python manage.py check

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DB_ENGINE: django.db.backends.postgresql
          DB_HOST: localhost
          DB_NAME: aj_test
          DB_USER: postgres
          DB_PASSWORD: postgres
        run: |
          python manage.py migrate

      - name: Collect static files
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
        run: |
          python manage.py collectstatic --noinput

  # ============================================
  # STAGE 2: Build Image
  # ============================================
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  # ============================================
  # STAGE 3: Deploy
  # ============================================
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            cd /caminho/do/projeto/AJ
            git pull origin main
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            export DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
            docker login -u ${DOCKER_USERNAME} -p ${DOCKER_PASSWORD}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput
            echo "Deploy concluído com sucesso!"

      - name: Deploy notification
        if: success()
        run: |
          echo "✅ Deploy realizado com sucesso!"
          echo "🔗 Produção: https://${{ secrets.PROD_DOMAIN }}"

      - name: Deploy failed notification
        if: failure()
        run: |
          echo "❌ Deploy falhou. Verifique os logs acima."
